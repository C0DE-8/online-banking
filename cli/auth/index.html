<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - bencbonki bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        dark: '#0f172a',
                        light: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-light min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="../index.html" class="text-2xl font-bold text-primary">bencbonki bank</a>
                <a href="register.html" class="text-gray-700 hover:text-primary font-medium">Need an account?</a>
            </div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
                    <p class="text-gray-600">Sign in to access your account</p>
                </div>

                <!-- Alert Message -->
                <div id="alertMessage" class="hidden mb-6 p-4 rounded-lg"></div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="identifier" class="block text-sm font-medium text-gray-700 mb-2">
                            Email or Account Number
                        </label>
                        <input 
                            type="text" 
                            id="identifier" 
                            name="identifier" 
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="Enter your email or account number"
                        >
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="Enter your password"
                        >
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                            <span class="ml-2 text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="text-sm text-primary hover:text-blue-900 font-medium">
                            Forgot password?
                        </a>
                    </div>

                    <button 
                        type="submit" 
                        id="loginButton"
                        class="w-full bg-primary text-white py-3 rounded-lg hover:bg-blue-900 transition-colors font-semibold flex items-center justify-center gap-2"
                    >
                        <svg id="loginSpinner" class="hidden w-5 h-5 spinner" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="loginButtonText">Sign In</span>
                    </button>
                </form>

                <!-- OTP Form -->
                <form id="otpForm" class="hidden space-y-6">
                    <div>
                        <label for="otp" class="block text-sm font-medium text-gray-700 mb-2">
                            Enter OTP Code
                        </label>
                        <input 
                            type="text" 
                            id="otp" 
                            name="otp" 
                            required
                            maxlength="6"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition text-center text-2xl tracking-widest"
                            placeholder="000000"
                        >
                        <p class="text-sm text-gray-500 mt-2">Check your email for the verification code</p>
                    </div>

                    <button 
                        type="submit" 
                        id="verifyOtpButton"
                        class="w-full bg-primary text-white py-3 rounded-lg hover:bg-blue-900 transition-colors font-semibold flex items-center justify-center gap-2"
                    >
                        <svg id="otpSpinner" class="hidden w-5 h-5 spinner" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="otpButtonText">Verify & Sign In</span>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Don't have an account? 
                        <a href="register.html" class="text-primary hover:text-blue-900 font-medium">Sign up</a>
                    </p>
                </div>
            </div>

            <!-- Security Badge -->
            <div class="mt-6 text-center text-sm text-gray-500">
                <p>🔒 Your connection is secure and encrypted</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.getApiBaseUrl("auth");
        let userData = {
            email: '',
            identifier: ''
        };

        // Show alert message
        function showAlert(message, type = 'error') {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `mb-6 p-4 rounded-lg ${type === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : 'bg-green-50 text-green-800 border border-green-200'}`;
            alertDiv.textContent = message;
            alertDiv.classList.remove('hidden');
            
            setTimeout(() => {
                alertDiv.classList.add('hidden');
            }, 5000);
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');
            const loginSpinner = document.getElementById('loginSpinner');
            const loginButtonText = document.getElementById('loginButtonText');
            
            loginButton.disabled = true;
            loginSpinner.classList.remove('hidden');
            loginButtonText.textContent = 'Signing in...';
            
            try {
                const response = await axios.post(`${API_BASE_URL}/login`, {
                    identifier,
                    password
                });
                
                if (response.data.otp_required) {
                    userData.identifier = identifier;
                    userData.email = response.data.email || identifier;
                    
                    showAlert(response.data.message || 'OTP sent to your email. Please check your inbox.', 'success');
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('otpForm').classList.remove('hidden');
                } else {
                    localStorage.setItem('token', response.data.token);
                    localStorage.setItem('user', JSON.stringify(response.data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    const user = response.data.user;
                    setTimeout(() => {
                        if (user.role === 'admin' || user.is_admin) {
                            window.location.href = '../admin/admin-dashboard.html';
                        } else {
                            window.location.href = '../pages/dashboard.html';
                        }
                    }, 1500);
                }
            } catch (error) {
                showAlert(error.response?.data?.error || 'Login failed. Please check your credentials and try again.');
            } finally {
                loginButton.disabled = false;
                loginSpinner.classList.add('hidden');
                loginButtonText.textContent = 'Sign In';
            }
        });

        // Handle OTP verification
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = document.getElementById('otp').value;
            const verifyButton = document.getElementById('verifyOtpButton');
            const otpSpinner = document.getElementById('otpSpinner');
            const otpButtonText = document.getElementById('otpButtonText');
            
            verifyButton.disabled = true;
            otpSpinner.classList.remove('hidden');
            otpButtonText.textContent = 'Verifying...';
            
            try {
                const response = await axios.post(`${API_BASE_URL}/login/verify-otp`, {
                    email: userData.email,
                    otp
                });
                
                localStorage.setItem('token', response.data.token);
                localStorage.setItem('user', JSON.stringify(response.data.user));
                showAlert('Login successful! Redirecting...', 'success');
                
                const user = response.data.user;
                setTimeout(() => {
                    if (user.role === 'admin' || user.is_admin) {
                        window.location.href = '../admin/admin-dashboard.html';
                    } else {
                        window.location.href = '../pages/dashboard.html';
                    }
                }, 1500);
            } catch (error) {
                const errorMsg = error.response?.data?.error || 'Invalid or expired OTP. Please try again.';
                showAlert(errorMsg);
                
                if (errorMsg.includes('not found')) {
                    showAlert('User session expired. Please login again.', 'error');
                    setTimeout(() => {
                        document.getElementById('otpForm').classList.add('hidden');
                        document.getElementById('loginForm').classList.remove('hidden');
                        document.getElementById('otp').value = '';
                    }, 2000);
                }
            } finally {
                verifyButton.disabled = false;
                otpSpinner.classList.add('hidden');
                otpButtonText.textContent = 'Verify & Sign In';
            }
        });
    </script>
</body>
</html>
