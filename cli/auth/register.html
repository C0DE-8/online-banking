<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - bencbonki bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        dark: '#0f172a',
                        light: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-light min-h-screen flex flex-col">
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="../index.html" class="text-2xl font-bold text-primary">bencbonki bank</a>
                <a href="login.html" class="text-gray-700 hover:text-primary font-medium">Already have an account?</a>
            </div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Create Account</h1>
                    <p class="text-gray-600">Join thousands of satisfied customers</p>
                </div>

                <div id="alertMessage" class="hidden mb-6 p-4 rounded-lg"></div>

                <form id="registerForm" class="space-y-5">
                    <div>
                        <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">
                            Full Name
                        </label>
                        <input 
                            type="text" 
                            id="full_name" 
                            name="full_name" 
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="John Doe"
                        >
                    </div>

                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                            Username
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="johndoe"
                        >
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="john@example.com"
                        >
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            minlength="8"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="Minimum 8 characters"
                        >
                    </div>

                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">
                            Confirm Password
                        </label>
                        <input 
                            type="password" 
                            id="confirm_password" 
                            name="confirm_password" 
                            required
                            minlength="8"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="Re-enter your password"
                        >
                    </div>

                    <div class="flex items-start">
                        <input 
                            type="checkbox" 
                            id="terms" 
                            required
                            class="w-4 h-4 mt-1 text-primary border-gray-300 rounded focus:ring-primary"
                        >
                        <label for="terms" class="ml-2 text-sm text-gray-600">
                            I agree to the <a href="#" class="text-primary hover:text-blue-900 font-medium">Terms of Service</a> and <a href="#" class="text-primary hover:text-blue-900 font-medium">Privacy Policy</a>
                        </label>
                    </div>

                    <button 
                        type="submit" 
                        id="registerButton"
                        class="w-full bg-primary text-white py-3 rounded-lg hover:bg-blue-900 transition-colors font-semibold"
                    >
                        Create Account
                    </button>
                </form>

                <form id="otpForm" class="hidden space-y-6">
                    <div class="text-center mb-4">
                        <h2 class="text-xl font-bold text-gray-900 mb-2">Verify Your Email</h2>
                        <p class="text-sm text-gray-600">We've sent a verification code to your email</p>
                    </div>

                    <div>
                        <label for="otp" class="block text-sm font-medium text-gray-700 mb-2">
                            Enter OTP Code
                        </label>
                        <input 
                            type="text" 
                            id="otp" 
                            name="otp" 
                            required
                            maxlength="6"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition text-center text-2xl tracking-widest"
                            placeholder="000000"
                        >
                    </div>

                    <button 
                        type="submit" 
                        id="verifyOtpButton"
                        class="w-full bg-primary text-white py-3 rounded-lg hover:bg-blue-900 transition-colors font-semibold"
                    >
                        Verify Email
                    </button>

                    <button 
                        type="button" 
                        id="resendOtpButton"
                        class="w-full text-primary hover:text-blue-900 font-medium text-sm"
                    >
                        Resend OTP
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account? 
                        <a href="login.html" class="text-primary hover:text-blue-900 font-medium">Sign in</a>
                    </p>
                </div>
            </div>

            <div class="mt-6 text-center text-sm text-gray-500">
                <p>🔒 Your information is secure and encrypted</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.getApiBaseUrl("auth");
        let userEmail = '';

        function showAlert(message, type = 'error') {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `mb-6 p-4 rounded-lg ${type === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : 'bg-green-50 text-green-800 border border-green-200'}`;
            alertDiv.textContent = message;
            alertDiv.classList.remove('hidden');
            
            setTimeout(() => {
                alertDiv.classList.add('hidden');
            }, 5000);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const full_name = document.getElementById('full_name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            
            if (password !== confirm_password) {
                showAlert('Passwords do not match');
                return;
            }
            
            const registerButton = document.getElementById('registerButton');
            registerButton.disabled = true;
            registerButton.textContent = 'Creating account...';
            
            try {
                const response = await axios.post(`${API_BASE_URL}/register`, {
                    full_name,
                    username,
                    email,
                    password
                });
                
                userEmail = email;
                showAlert(response.data.message, 'success');
                
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('otpForm').classList.remove('hidden');
            } catch (error) {
                showAlert(error.response?.data?.error || 'Registration failed. Please try again.');
            } finally {
                registerButton.disabled = false;
                registerButton.textContent = 'Create Account';
            }
        });

        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = document.getElementById('otp').value;
            const verifyButton = document.getElementById('verifyOtpButton');
            
            verifyButton.disabled = true;
            verifyButton.textContent = 'Verifying...';
            
            try {
                const response = await axios.post(`${API_BASE_URL}/verify-otp`, {
                    email: userEmail,
                    otp
                });
                
                showAlert('Email verified successfully! Redirecting to login...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                showAlert(error.response?.data?.error || 'Invalid OTP. Please try again.');
            } finally {
                verifyButton.disabled = false;
                verifyButton.textContent = 'Verify Email';
            }
        });

        document.getElementById('resendOtpButton').addEventListener('click', async () => {
            const resendButton = document.getElementById('resendOtpButton');
            resendButton.disabled = true;
            resendButton.textContent = 'Sending...';
            
            try {
                const response = await axios.post(`${API_BASE_URL}/resend-otp`, {
                    email: userEmail
                });
                
                showAlert(response.data.message, 'success');
            } catch (error) {
                showAlert(error.response?.data?.error || 'Failed to resend OTP');
            } finally {
                resendButton.disabled = false;
                resendButton.textContent = 'Resend OTP';
            }
        });
    </script>
</body>
</html>
