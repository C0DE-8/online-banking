<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Transfer - bencbonki bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        dark: '#0f172a',
                        light: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-light min-h-screen">
  
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-primary">bencbonki bank</h1>
                    <div class="hidden md:block ml-10">
                        <div class="flex items-baseline space-x-6">
                            <a href="dashboard.html" class="text-gray-700 hover:text-primary transition-colors">Dashboard</a>
                            <a href="#" class="text-gray-700 hover:text-primary transition-colors">Accounts</a>
                            <a href="transactions-history.html" class="text-gray-700 hover:text-primary transition-colors">Transactions</a>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userName" class="text-gray-700 font-medium"></span>
                    <button id="logoutButton" class="text-gray-700 hover:text-primary font-medium transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Self Transfer</h2>
                <p class="text-gray-600">Transfer money between your own accounts</p>
            </div>
            <a href="dashboard.html" class="bg-gray-100 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors font-medium">
                Back to Dashboard
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <div id="alertMessage" class="hidden mb-6 p-4 rounded-lg"></div>

            <form id="selfTransferForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">From Account</label>
                    <select id="fromAccount" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <option value="">Select account</option>
                        <option value="current">Current Account</option>
                        <option value="savings">Savings Account</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">To Account</label>
                    <select id="toAccount" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <option value="">Select account</option>
                        <option value="current">Current Account</option>
                        <option value="savings">Savings Account</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Amount</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-medium">$</span>
                        <input type="number" id="amount" required step="0.01" min="0.01" class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="0.00">
                    </div>
                </div>

                <div class="bg-purple-50 border border-purple-200 rounded-lg p-4">
                    <div class="flex items-start">
                        <svg class="w-5 h-5 text-purple-600 mt-0.5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <div class="text-sm text-purple-800">
                            <p class="font-medium mb-1">Self Transfer Information</p>
                            <p>Transfers between your accounts are instant and free of charge.</p>
                        </div>
                    </div>
                </div>

                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-primary text-white py-3 rounded-lg hover:bg-blue-900 transition-colors font-medium">
                        Transfer Now
                    </button>
                    <a href="transactions-history.html" class="flex-1 bg-secondary text-white py-3 rounded-lg hover:bg-blue-600 transition-colors font-medium text-center">
                        View History
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.getApiBaseUrl("user");
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || !user.id) {
            window.location.href = '../auth/login.html';
        }

        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;

        document.getElementById('userName').textContent = user.username || 'User';

        function showAlert(message, type = 'success') {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `mb-6 p-4 rounded-lg ${type === 'success' ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-red-50 text-red-800 border border-red-200'}`;
            alertDiv.textContent = message;
            alertDiv.classList.remove('hidden');
            
            setTimeout(() => {
                alertDiv.classList.add('hidden');
            }, 5000);
        }

        document.getElementById('selfTransferForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fromAccount = document.getElementById('fromAccount').value;
            const toAccount = document.getElementById('toAccount').value;

            if (fromAccount === toAccount) {
                showAlert('Cannot transfer to the same account', 'error');
                return;
            }

            const formData = {
                from_account: fromAccount,
                to_account: toAccount,
                amount: parseFloat(document.getElementById('amount').value)
            };

            try {
                const response = await axios.post(`${API_BASE_URL}/transfer/self`, formData);
                showAlert(response.data.message || 'Self transfer completed successfully!', 'success');
                document.getElementById('selfTransferForm').reset();
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } catch (error) {
                const errorMessage = error.response?.data?.error || 'Failed to process self transfer';
                showAlert(errorMessage, 'error');
            }
        });

        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        });
    </script>
</body>
</html>
