<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Details - bencbonki bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        dark: '#0f172a',
                        light: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
            border-radius: 4px;
        }
        @media print {
            nav, button { display: none !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-primary">bencbonki bank</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userName" class="text-gray-700 font-medium"></span>
                    <button id="logoutButton" class="text-gray-700 hover:text-primary font-medium transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <button onclick="window.history.back()" class="flex items-center text-primary hover:text-secondary transition-colors font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back to History
            </button>
        </div>

        <div id="loadingState" class="bg-white rounded-2xl shadow-lg p-8">
            <div class="space-y-6">
                <div class="bg-gradient-to-r from-gray-200 to-gray-300 p-8 rounded-t-2xl">
                    <div class="skeleton h-8 w-48 mb-4"></div>
                    <div class="skeleton h-12 w-64 mb-2"></div>
                    <div class="skeleton h-6 w-32"></div>
                </div>
                <div class="p-8 space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <div class="skeleton h-4 w-32"></div>
                            <div class="skeleton h-6 w-full"></div>
                            <div class="skeleton h-6 w-full"></div>
                        </div>
                        <div class="space-y-3">
                            <div class="skeleton h-4 w-32"></div>
                            <div class="skeleton h-6 w-full"></div>
                            <div class="skeleton h-6 w-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="transactionDetail" class="hidden">
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="bg-gradient-to-r from-primary to-secondary p-8 text-white">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-3xl font-bold mb-2">Transaction Details</h2>
                            <p class="text-blue-100" id="transactionDate"></p>
                        </div>
                        <span id="statusBadge" class="px-4 py-2 rounded-full text-sm font-semibold"></span>
                    </div>
                    <div class="text-5xl font-bold" id="transactionAmount"></div>
                    <p class="text-blue-100 mt-2" id="transactionType"></p>
                </div>

                <div class="p-8">
                    <div class="grid md:grid-cols-2 gap-6 mb-8">
                        <div class="bg-gradient-to-br from-blue-50 to-white p-6 rounded-xl border border-blue-100">
                            <h3 class="text-sm font-semibold text-gray-500 uppercase mb-4">Transaction Information</h3>
                            <div class="space-y-3">
                                <div>
                                    <p class="text-xs text-gray-500">Transaction ID</p>
                                    <p class="font-mono text-sm font-semibold text-gray-900" id="transactionId"></p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500">From Account</p>
                                    <p class="font-semibold text-gray-900" id="fromAccount"></p>
                                </div>
                                <div id="feeContainer">
                                    <p class="text-xs text-gray-500">Transaction Fee</p>
                                    <p class="font-semibold text-gray-900" id="transactionFee"></p>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gradient-to-br from-green-50 to-white p-6 rounded-xl border border-green-100">
                            <h3 class="text-sm font-semibold text-gray-500 uppercase mb-4">Recipient Details</h3>
                            <div class="space-y-3" id="recipientDetails"></div>
                        </div>
                    </div>

                    <div id="wireSpecificDetails" class="hidden mb-8">
                        <div class="bg-gradient-to-br from-purple-50 to-white p-6 rounded-xl border border-purple-100">
                            <h3 class="text-sm font-semibold text-gray-500 uppercase mb-4">Wire Transfer Details</h3>
                            <div class="grid md:grid-cols-2 gap-4">
                                <div>
                                    <p class="text-xs text-gray-500">Bank Country</p>
                                    <p class="font-semibold text-gray-900" id="bankCountry"></p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500">Routing Number</p>
                                    <p class="font-mono text-sm font-semibold text-gray-900" id="routingNumber"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="reasonContainer" class="bg-gradient-to-br from-amber-50 to-white p-6 rounded-xl border border-amber-100 mb-8">
                        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-2">Transaction Purpose</h3>
                        <p class="text-gray-900" id="transactionReason"></p>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="window.print()" class="flex-1 bg-primary text-white px-6 py-3 rounded-lg hover:bg-secondary transition-colors font-semibold">
                            Print Receipt
                        </button>
                        <button onclick="downloadReceipt()" class="flex-1 bg-gray-100 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-200 transition-colors font-semibold">
                            Download PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="errorState" class="hidden bg-white rounded-2xl shadow-lg p-8 text-center">
            <div class="text-red-600 mb-4">
                <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Transaction Not Found</h3>
            <p class="text-gray-600 mb-6">The transaction you're looking for could not be found.</p>
            <button onclick="window.location.href='transactions-history.html'" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-secondary transition-colors font-semibold">
                Back to History
            </button>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.getApiBaseUrl("user");
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || !user.id) {
            window.location.href = '../auth/login.html';
        }

        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        document.getElementById('userName').textContent = user.username || 'User';

        const urlParams = new URLSearchParams(window.location.search);
        const transactionId = urlParams.get('id');
        const transactionType = urlParams.get('type');

        function formatNumber(num) {
            if (!num) return '0.00';
            const number = typeof num === 'string' ? parseFloat(num.replace(/[^0-9.-]/g, '')) : num;
            return number.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function loadTransactionDetails() {
            if (!transactionId) {
                showError();
                return;
            }

            try {
                const response = await axios.get(`${API_BASE_URL}/transfer/history/${transactionId}`);
                const transaction = response.data.transfer;

                if (!transaction) {
                    showError();
                    return;
                }

                displayTransaction(transaction);
            } catch (error) {
                console.error('Error loading transaction:', error);
                showError();
            }
        }

        function displayTransaction(t) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('transactionDetail').classList.remove('hidden');

            const rawAmount = t.amount.replace(/[^0-9.-]/g, '');
            document.getElementById('transactionAmount').textContent = `$${formatNumber(rawAmount)}`;
            
            document.getElementById('transactionDate').textContent = t.date;
            document.getElementById('transactionType').textContent = `${t.type.toUpperCase()} Transfer`;
            document.getElementById('transactionId').textContent = `#${t.id}`;
            document.getElementById('fromAccount').textContent = t.from_account === 'current' ? 'Current Account' : 'Savings Account';
            
            if (t.fee) {
                const rawFee = t.fee.replace(/[^0-9.-]/g, '');
                document.getElementById('transactionFee').textContent = `$${formatNumber(rawFee)}`;
            } else {
                document.getElementById('feeContainer').classList.add('hidden');
            }

            const statusColors = {
                'completed': 'bg-green-500 text-white',
                'pending': 'bg-yellow-500 text-white',
                'processing': 'bg-blue-500 text-white',
                'failed': 'bg-red-500 text-white'
            };
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.textContent = (t.status || 'completed').toUpperCase();
            statusBadge.className = `px-4 py-2 rounded-full text-sm font-semibold ${statusColors[t.status] || 'bg-gray-500 text-white'}`;

            let recipientHTML = '';
            if (t.type === 'self') {
                recipientHTML = `
                    <div>
                        <p class="text-xs text-gray-500">To Account</p>
                        <p class="font-semibold text-gray-900">${t.to_account === 'current' ? 'Current Account' : 'Savings Account'}</p>
                    </div>
                `;
            } else {
                recipientHTML = `
                    <div>
                        <p class="text-xs text-gray-500">Bank Name</p>
                        <p class="font-semibold text-gray-900">${t.bank_name || 'N/A'}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Account Name</p>
                        <p class="font-semibold text-gray-900">${t.account_name || 'N/A'}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Account Number</p>
                        <p class="font-mono text-sm font-semibold text-gray-900">${t.account_number || 'N/A'}</p>
                    </div>
                `;
            }
            document.getElementById('recipientDetails').innerHTML = recipientHTML;

            if (t.type === 'wire' && (t.bank_country || t.routine_number)) {
                document.getElementById('wireSpecificDetails').classList.remove('hidden');
                document.getElementById('bankCountry').textContent = t.bank_country || 'N/A';
                document.getElementById('routingNumber').textContent = t.routine_number || 'N/A';
            }

            if (t.reason) {
                document.getElementById('transactionReason').textContent = t.reason;
            } else {
                document.getElementById('reasonContainer').classList.add('hidden');
            }
        }

        function showError() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
        }

        function downloadReceipt() {
            window.print();
        }

        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        });

        loadTransactionDetails();
    </script>
</body>
</html>
