<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Tickets - SecureBank Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../api.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        dark: '#0f172a',
                        light: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-200">

    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <h1 class="text-xl sm:text-2xl font-bold text-primary dark:text-blue-400">SecureBank Admin</h1>
                    <div class="hidden md:flex space-x-1">
                        <a href="admin-dashboard.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">Dashboard</a>
                        <a href="admin-wallets.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">Wallets</a>
                        <a href="admin-tickets.html" class="px-4 py-2 text-white bg-primary dark:bg-blue-600 rounded-lg font-medium transition-colors">Tickets</a>
                        <a href="admin-deposits.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">Deposits</a>
                    </div>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                        <svg id="sunIcon" class="w-5 h-5 text-gray-700 dark:text-gray-300 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                        <svg id="moonIcon" class="w-5 h-5 text-gray-700 dark:text-gray-300 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                    <button id="logoutButton" class="hidden sm:block px-4 py-2 text-white bg-red-600 hover:bg-red-700 rounded-lg font-medium transition-colors text-sm">
                        Logout
                    </button>
                     <!-- Added mobile menu button -->
                    <button id="mobileMenuBtn" class="md:hidden p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                        <svg class="w-6 h-6 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
         <!-- Added mobile menu dropdown -->
        <div id="mobileMenu" class="hidden md:hidden border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
            <div class="px-4 py-3 space-y-2">
                <a href="admin-dashboard.html" class="block px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium">Dashboard</a>
                <a href="admin-wallets.html" class="block px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium">Wallets</a>
                <a href="admin-tickets.html" class="block px-4 py-2 text-white bg-primary dark:bg-blue-600 rounded-lg font-medium">Tickets</a>
                <a href="admin-deposits.html" class="block px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium">Deposits</a>
                <div class="pt-2 border-t border-gray-200 dark:border-gray-700">
                    <button id="logoutButtonMobile" class="w-full px-4 py-2 text-white bg-red-600 hover:bg-red-700 rounded-lg font-medium transition-colors text-sm">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>


    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-2">Support Tickets</h2>
            <p class="text-gray-600 dark:text-gray-400">Manage customer support tickets and conversations</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-xl font-semibold text-gray-900 dark:text-gray-100">All Tickets</h3>
            </div>
            <div id="ticketsContainer" class="p-6">
                <div class="flex justify-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
            </div>
        </div>

    </main>

    
    <div id="ticketModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl max-w-4xl w-full max-h-[90vh] flex flex-col">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-semibold text-gray-900 dark:text-gray-100" id="modalTicketSubject"></h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Ticket #<span id="modalTicketId"></span> • User ID: <span id="modalUserId"></span></p>
                </div>
                <button onclick="closeTicketModal()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div id="messagesContainer" class="flex-1 overflow-y-auto p-6 space-y-4">
                 Messages will be loaded here 
            </div>

            <div class="p-6 border-t border-gray-200 dark:border-gray-700">
                <form id="replyForm" class="space-y-4">
                    <textarea id="replyMessage" rows="3" required class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none" placeholder="Type your reply..."></textarea>
                    <div class="flex gap-3">
                        <button type="submit" id="replyBtn" class="flex-1 px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                            <span>Send Reply</span>
                            <svg class="w-5 h-5 hidden animate-spin" id="replySpinner" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                        <button type="button" id="closeTicketBtn" onclick="closeTicket()" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                            <span>Close Ticket</span>
                            <svg class="w-5 h-5 hidden animate-spin" id="closeTicketSpinner" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.getApiBaseUrl("admin");
        let currentTicketId = null;
        let currentTicketStatus = null;
        let autoRefreshInterval = null;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-lg shadow-lg transform transition-all duration-300 translate-x-0 ${
                type === 'success' ? 'bg-green-500' : 'bg-red-500'
            } text-white`;
            toast.innerHTML = `
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${type === 'success' 
                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'
                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>'
                    }
                </svg>
                <span class="font-medium">${message}</span>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            const mobileMenu = document.getElementById('mobileMenu');
            mobileMenu.classList.toggle('hidden');
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || (!user.role || user.role !== 'admin') && !user.is_admin) {
                window.location.href = '../auth/login.html';
                return false;
            }
            return true;
        }

        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        });

        document.getElementById('logoutButtonMobile').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        });

        async function loadTickets() {
            const token = localStorage.getItem('token');
            try {
                const response = await axios.get(`${API_BASE_URL}/tickets`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                const container = document.getElementById('ticketsContainer');
                if (response.data.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400 py-8">No support tickets found.</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="space-y-4">
                        ${response.data.map(ticket => `
                            <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:shadow-lg transition-shadow cursor-pointer" onclick="openTicketModal(${ticket.id})">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex-1">
                                        <h4 class="font-semibold text-lg text-gray-900 dark:text-gray-100">${ticket.subject}</h4>
                                        <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">User ID: ${ticket.user_id} • Ticket #${ticket.id}</p>
                                    </div>
                                    <span class="px-3 py-1 rounded-full text-xs font-medium ${
                                        ticket.status === 'open' 
                                            ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200' 
                                            : 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300'
                                    }">
                                        ${ticket.status.toUpperCase()}
                                    </span>
                                </div>
                                <p class="text-xs text-gray-500 dark:text-gray-500">${new Date(ticket.created_at).toLocaleString()}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading tickets:', error);
                showToast('Failed to load tickets', 'error');
            }
        }

        async function openTicketModal(ticketId) {
            currentTicketId = ticketId;
            const token = localStorage.getItem('token');
            
            try {
                const response = await axios.get(`${API_BASE_URL}/tickets/${ticketId}/messages`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                const { ticket, messages } = response.data;
                currentTicketStatus = ticket.status;
                
                document.getElementById('modalTicketId').textContent = ticket.id;
                document.getElementById('modalTicketSubject').textContent = ticket.subject;
                document.getElementById('modalUserId').textContent = ticket.user_id;
                
                const messagesContainer = document.getElementById('messagesContainer');
                const scrollPosition = messagesContainer.scrollTop;
                const wasAtBottom = messagesContainer.scrollHeight - messagesContainer.scrollTop === messagesContainer.clientHeight;
                
                messagesContainer.innerHTML = messages.map(msg => `
                    <div class="flex ${msg.sender === 'admin' ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[70%] ${
                            msg.sender === 'admin' 
                                ? 'bg-blue-600 text-white' 
                                : 'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100'
                        } rounded-lg p-4">
                            <p class="text-sm font-medium mb-1">${msg.sender === 'admin' ? 'Admin' : 'User'}</p>
                            <p class="whitespace-pre-wrap">${msg.message}</p>
                            <p class="text-xs mt-2 ${msg.sender === 'admin' ? 'text-blue-100' : 'text-gray-500 dark:text-gray-400'}">
                                ${new Date(msg.created_at).toLocaleString()}
                            </p>
                        </div>
                    </div>
                `).join('');
                
                if (wasAtBottom || scrollPosition === 0) {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else {
                    messagesContainer.scrollTop = scrollPosition;
                }
                
                const replyForm = document.getElementById('replyForm');
                const closeBtn = document.getElementById('closeTicketBtn');
                
                if (ticket.status === 'closed') {
                    replyForm.querySelector('textarea').disabled = true;
                    replyForm.querySelector('button[type="submit"]').disabled = true;
                    closeBtn.disabled = true;
                    replyForm.querySelector('textarea').placeholder = 'This ticket is closed. No further replies allowed.';
                } else {
                    replyForm.querySelector('textarea').disabled = false;
                    replyForm.querySelector('button[type="submit"]').disabled = false;
                    closeBtn.disabled = false;
                    replyForm.querySelector('textarea').placeholder = 'Type your reply...';
                }
                
                document.getElementById('ticketModal').classList.remove('hidden');
                
                if (ticket.status === 'open') {
                    startAutoRefresh();
                }
            } catch (error) {
                console.error('Error loading ticket details:', error);
                showToast('Failed to load ticket details', 'error');
            }
        }

        function closeTicketModal() {
            document.getElementById('ticketModal').classList.add('hidden');
            document.getElementById('replyForm').reset();
            currentTicketId = null;
            currentTicketStatus = null;
            stopAutoRefresh();
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            autoRefreshInterval = setInterval(() => {
                if (currentTicketId && currentTicketStatus === 'open') {
                    openTicketModal(currentTicketId);
                }
            }, 10000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        document.getElementById('replyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const btn = document.getElementById('replyBtn');
            const spinner = document.getElementById('replySpinner');
            const message = document.getElementById('replyMessage').value;
            
            btn.disabled = true;
            spinner.classList.remove('hidden');

            try {
                await axios.post(`${API_BASE_URL}/tickets/${currentTicketId}/reply`, 
                    { message },
                    { headers: { Authorization: `Bearer ${token}` } }
                );
                showToast('Reply sent successfully!');
                document.getElementById('replyMessage').value = '';
                openTicketModal(currentTicketId);
            } catch (error) {
                console.error('Error sending reply:', error);
                showToast(error.response?.data?.error || 'Failed to send reply', 'error');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });

        async function closeTicket() {
            if (!confirm('Are you sure you want to close this ticket?')) {
                return;
            }

            const token = localStorage.getItem('token');
            const btn = document.getElementById('closeTicketBtn');
            const spinner = document.getElementById('closeTicketSpinner');
            
            btn.disabled = true;
            spinner.classList.remove('hidden');

            try {
                await axios.put(`${API_BASE_URL}/tickets/${currentTicketId}/close`, {}, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                showToast('Ticket closed successfully!');
                stopAutoRefresh();
                closeTicketModal();
                loadTickets();
            } catch (error) {
                console.error('Error closing ticket:', error);
                showToast(error.response?.data?.error || 'Failed to close ticket', 'error');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }

        if (checkAuth()) {
            initTheme();
            loadTickets();
        }
    </script>
</body>
</html>
