<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Management - SecureBank Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../api.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        dark: '#0f172a',
                        light: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-200">


    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <h1 class="text-xl sm:text-2xl font-bold text-primary dark:text-blue-400">SecureBank Admin</h1>
                    <div class="hidden md:flex space-x-1">
                        <a href="admin-dashboard.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">Dashboard</a>
                        <a href="admin-wallets.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">Wallets</a>
                        <a href="admin-tickets.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">Tickets</a>
                        <a href="admin-deposits.html" class="px-4 py-2 text-white bg-primary dark:bg-blue-600 rounded-lg font-medium transition-colors">Deposits</a>
                    </div>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                        <svg id="sunIcon" class="w-5 h-5 text-gray-700 dark:text-gray-300 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                        <svg id="moonIcon" class="w-5 h-5 text-gray-700 dark:text-gray-300 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                    <button id="logoutButton" class="hidden sm:block px-4 py-2 text-white bg-red-600 hover:bg-red-700 rounded-lg font-medium transition-colors text-sm">
                        Logout
                    </button>
                     <!-- Added mobile menu button -->
                    <button id="mobileMenuBtn" class="md:hidden p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                        <svg class="w-6 h-6 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
         <!-- Added mobile menu dropdown -->
        <div id="mobileMenu" class="hidden md:hidden border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
            <div class="px-4 py-3 space-y-2">
                <a href="admin-dashboard.html" class="block px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium">Dashboard</a>
                <a href="admin-wallets.html" class="block px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium">Wallets</a>
                <a href="admin-tickets.html" class="block px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium">Tickets</a>
                <a href="admin-deposits.html" class="block px-4 py-2 text-white bg-primary dark:bg-blue-600 rounded-lg font-medium">Deposits</a>
                <div class="pt-2 border-t border-gray-200 dark:border-gray-700">
                    <button id="logoutButtonMobile" class="w-full px-4 py-2 text-white bg-red-600 hover:bg-red-700 rounded-lg font-medium transition-colors text-sm">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>


    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        

        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-2">Deposit Management</h2>
            <p class="text-gray-600 dark:text-gray-400">Review and approve customer deposits</p>
        </div>

 
        <div class="mb-6 flex gap-2 flex-wrap">
            <button onclick="filterDeposits('all')" class="filter-btn px-4 py-2 rounded-lg font-medium transition-colors bg-blue-600 text-white" data-filter="all">
                All Deposits
            </button>
            <button onclick="filterDeposits('pending')" class="filter-btn px-4 py-2 rounded-lg font-medium transition-colors bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300" data-filter="pending">
                Pending
            </button>
            <button onclick="filterDeposits('confirmed')" class="filter-btn px-4 py-2 rounded-lg font-medium transition-colors bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300" data-filter="confirmed">
                Confirmed
            </button>
            <button onclick="filterDeposits('rejected')" class="filter-btn px-4 py-2 rounded-lg font-medium transition-colors bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300" data-filter="rejected">
                Rejected
            </button>
        </div>


        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
            <div id="depositsContainer" class="p-6">
                <div class="flex justify-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
            </div>
        </div>

    </main>

    <div id="proofModal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4" onclick="closeProofModal()">
        <div class="max-w-4xl w-full" onclick="event.stopPropagation()">
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Proof of Payment</h3>
                    <button onclick="closeProofModal()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-4 flex justify-center bg-gray-100 dark:bg-gray-900">
                    <img id="proofImage" src="/placeholder.svg" alt="Proof of Payment" class="max-w-full max-h-[70vh] object-contain rounded-lg">
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.getApiBaseUrl("admin");
        let allDeposits = [];
        let currentFilter = 'all';

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-lg shadow-lg transform transition-all duration-300 translate-x-0 ${
                type === 'success' ? 'bg-green-500' : 'bg-red-500'
            } text-white`;
            toast.innerHTML = `
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${type === 'success' 
                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'
                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>'
                    }
                </svg>
                <span class="font-medium">${message}</span>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            const mobileMenu = document.getElementById('mobileMenu');
            mobileMenu.classList.toggle('hidden');
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || (!user.role || user.role !== 'admin') && !user.is_admin) {
                window.location.href = '../auth/login.html';
                return false;
            }
            return true;
        }

        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        });

        document.getElementById('logoutButtonMobile').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        });

        async function loadDeposits() {
            const token = localStorage.getItem('token');
            try {
                const response = await axios.get(`${API_BASE_URL}/deposits`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                allDeposits = response.data.deposits;
                renderDeposits();
            } catch (error) {
                console.error('Error loading deposits:', error);
                showToast('Failed to load deposits', 'error');
            }
        }

        function filterDeposits(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.className = 'filter-btn px-4 py-2 rounded-lg font-medium transition-colors bg-blue-600 text-white';
                } else {
                    btn.className = 'filter-btn px-4 py-2 rounded-lg font-medium transition-colors bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300';
                }
            });
            
            renderDeposits();
        }

        function renderDeposits() {
            const container = document.getElementById('depositsContainer');
            const filteredDeposits = currentFilter === 'all' 
                ? allDeposits 
                : allDeposits.filter(d => d.status === currentFilter);
            
            if (filteredDeposits.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400 py-8">No deposits found.</p>';
                return;
            }

            container.innerHTML = `
                <div class="space-y-4">
                    ${filteredDeposits.map(deposit => `
                        <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:shadow-lg transition-shadow">
                            <div class="flex flex-col md:flex-row gap-4">
                                <div class="flex-shrink-0">
                                    <img src="${deposit.proof_url}" alt="Proof" class="w-32 h-32 object-cover rounded-lg cursor-pointer hover:opacity-80 transition-opacity" onclick="openProofModal('${deposit.proof_url}')">
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-start mb-2">
                                        <div>
                                            <h4 class="font-semibold text-lg text-gray-900 dark:text-gray-100">$${parseFloat(deposit.amount).toFixed(2)}</h4>
                                            <p class="text-sm text-gray-600 dark:text-gray-400">User: ${deposit.username} • Wallet: ${deposit.wallet_name}</p>
                                            <p class="text-xs text-gray-500 dark:text-gray-500 mt-1">${new Date(deposit.created_at).toLocaleString()}</p>
                                        </div>
                                        <span class="px-3 py-1 rounded-full text-xs font-medium ${
                                            deposit.status === 'pending' 
                                                ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200' 
                                                : deposit.status === 'confirmed'
                                                ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200'
                                                : 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200'
                                        }">
                                            ${deposit.status.toUpperCase()}
                                        </span>
                                    </div>
                                    ${deposit.status === 'pending' ? `
                                        <div class="flex gap-2 mt-4">
                                            <button onclick="confirmDeposit(${deposit.id})" class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                <span>Approve</span>
                                                <svg class="w-4 h-4 hidden animate-spin confirm-spinner-${deposit.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                            </button>
                                            <button onclick="rejectDeposit(${deposit.id})" class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                <span>Reject</span>
                                                <svg class="w-4 h-4 hidden animate-spin reject-spinner-${deposit.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                            </button>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function openProofModal(imageUrl) {
            document.getElementById('proofImage').src = imageUrl;
            document.getElementById('proofModal').classList.remove('hidden');
        }

        function closeProofModal() {
            document.getElementById('proofModal').classList.add('hidden');
        }

        async function confirmDeposit(depositId) {
            const token = localStorage.getItem('token');
            const spinner = document.querySelector(`.confirm-spinner-${depositId}`);
            
            spinner.classList.remove('hidden');

            try {
                await axios.put(`${API_BASE_URL}/deposit/${depositId}/confirm`, {}, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                showToast('Deposit approved successfully!');
                loadDeposits();
            } catch (error) {
                console.error('Error confirming deposit:', error);
                showToast(error.response?.data?.error || 'Failed to approve deposit', 'error');
            } finally {
                spinner.classList.add('hidden');
            }
        }

        async function rejectDeposit(depositId) {
            if (!confirm('Are you sure you want to reject this deposit?')) {
                return;
            }

            const token = localStorage.getItem('token');
            const spinner = document.querySelector(`.reject-spinner-${depositId}`);
            
            spinner.classList.remove('hidden');

            try {
                await axios.put(`${API_BASE_URL}/deposit/${depositId}/reject`, {}, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                showToast('Deposit rejected successfully!');
                loadDeposits();
            } catch (error) {
                console.error('Error rejecting deposit:', error);
                showToast(error.response?.data?.error || 'Failed to reject deposit', 'error');
            } finally {
                spinner.classList.add('hidden');
            }
        }

        if (checkAuth()) {
            initTheme();
            loadDeposits();
        }
    </script>
</body>
</html>
